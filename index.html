
<style>
*{box-sizing:border-box;margin:0;padding:0}
#game{width:100%;min-height:620px;background:#0a0a0a;color:#fff;position:relative;overflow:hidden;border-radius:8px;font-family:sans-serif}
canvas{display:block}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hidden{display:none!important}
.btn{background:transparent;border:1.5px solid #e63946;color:#e63946;padding:9px 28px;border-radius:6px;font-size:.95rem;cursor:pointer;margin:4px;transition:background .2s,color .2s}
.btn:hover{background:#e63946;color:#fff}
.btn-green{border-color:#4caf50;color:#4caf50}.btn-green:hover{background:#4caf50;color:#fff}
.btn-gray{border-color:#555;color:#999}.btn-gray:hover{background:#333;color:#fff}

input[type=text]{background:#0d0d0d;border:1px solid #2a2a2a;color:#fff;padding:9px 14px;border-radius:6px;font-size:.95rem;width:220px;margin-bottom:10px;outline:none}
input[type=text]:focus{border-color:#e63946}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:rgba(0,0,0,.88);z-index:10;flex-wrap:wrap;gap:2px}
.hud-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-label{font-size:8px;color:#666;letter-spacing:1px;text-transform:uppercase}
.hud-val{font-size:13px;font-weight:500;color:#fff}
.hud-val.red{color:#e63946}.hud-val.green{color:#4caf50}.hud-val.yellow{color:#f4c542}.hud-val.gold{color:#ffd700}
.bar-track{width:72px;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:2px}
.bar-fill{height:100%;border-radius:3px;transition:width .12s}
#hud-health-fill{background:#e63946}#hud-ammo-fill{background:#4caf50}
.challenge-badge{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(244,197,66,.1);border:1px solid #f4c542;color:#f4c542;padding:4px 14px;border-radius:20px;font-size:10px;z-index:10;pointer-events:none;white-space:nowrap}

.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:.6rem 0;max-height:240px;overflow-y:auto;width:100%;max-width:480px}
.level-btn{background:#0e0e0e;border:1px solid #1a1a1a;color:#444;padding:7px 4px;border-radius:5px;cursor:default;font-size:11px;text-align:center;transition:all .15s}
.level-btn.unlocked{border-color:#c0303a;color:#ddd;cursor:pointer}.level-btn.unlocked:hover{background:#c0303a22}
.level-btn.boss{border-color:#f4c542;color:#f4c542}.level-btn.completed{border-color:#2a6b3a;color:#4caf50}
.msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.95);border:1px solid #e63946;padding:12px 24px;border-radius:6px;font-size:.95rem;color:#fff;z-index:50;pointer-events:none;opacity:0;transition:opacity .25s;text-align:center;white-space:nowrap}
.boss-health-bar{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);width:240px;z-index:10}
.boss-hb-label{font-size:10px;color:#f4c542;margin-bottom:2px;text-align:center;letter-spacing:1px}
.boss-hb-track{height:9px;background:#1a1a1a;border-radius:5px;overflow:hidden;border:1px solid #f4c542}
.boss-hb-fill{height:100%;background:#f4c542;transition:width .08s;border-radius:5px}
.pause-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:480px;margin:.4rem 0;max-height:280px;overflow-y:auto}
.shop-item{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:6px;padding:9px 11px;display:flex;flex-direction:column;gap:3px;transition:border-color .2s}
.shop-item.can-buy{cursor:pointer}.shop-item.can-buy:hover{border-color:#f4c542;background:#110f00}
.shop-item.owned{border-color:#2a6b3a;background:#001008}.shop-item.equipped{border-color:#4caf50;background:#001a0a}.shop-item.cant-buy{opacity:.4}
.shop-item-name{font-size:12px;font-weight:500;color:#ddd}.shop-item-desc{font-size:10px;color:#777;line-height:1.3}.shop-item-price{font-size:11px;color:#f4c542;margin-top:1px}
.shop-tabs{display:flex;gap:5px;margin-bottom:8px}
.shop-tab{background:transparent;border:1px solid #2a2a2a;color:#777;padding:5px 14px;border-radius:5px;font-size:12px;cursor:pointer;transition:all .2s}
.shop-tab.active{border-color:#f4c542;color:#f4c542;background:#110f00}
.coin-disp{display:flex;align-items:center;gap:5px;background:#110f00;border:1px solid #3a3000;border-radius:20px;padding:3px 12px;font-size:13px;color:#f4c542;font-weight:500}
.gp-focus{outline:2px solid #f4c542!important;box-shadow:0 0 10px #f4c54299!important;position:relative}
.gp-focus.shop-item{outline-offset:2px}
#gp-indicator{position:absolute;top:6px;right:10px;z-index:30;font-size:15px;opacity:0;pointer-events:none;transition:opacity .4s;text-shadow:0 0 6px #000}
</style>

<script>
const TOTAL_LEVELS=50;
const BOSS_LEVELS=[8,16,25,33,42,50];
const CHALLENGES=["Matar 5 zumbis em 10s","Sobreviver sem recarregar","3 mortes seguidas precisas","Sem dano por 15s","Matar corredor com 1 tiro","Limpar onda em 8s","Usar 20% de municao","Matar zumbi correndo","Sobreviver com 10% de vida","Eliminar chefao sem dano","Matar 10 sem parar","Headshot triplo","Dois corredores sem recarregar"];

const WEAPONS={
  pistol:{id:'pistol',name:'Pistola',desc:'Arma básica. Confiável.',price:0,damage:1,ammo:30,cooldown:10,bspd:13,bsz:4,spread:0,color:'#ffe066'},
  smg:{id:'smg',name:'SMG',desc:'Cadência alta, dispersão leve.',price:200,damage:1,ammo:50,cooldown:5,bspd:14,bsz:3.5,spread:0.08,color:'#80d8ff'},
  shotgun:{id:'shotgun',name:'Escopeta',desc:'3 projéteis. Destroça tudo.',price:350,damage:1,ammo:20,cooldown:22,bspd:11,bsz:5,spread:0.22,color:'#ff8a65'},
  rifle:{id:'rifle',name:'Rifle',desc:'Precisão e dano elevado.',price:500,damage:2,ammo:25,cooldown:14,bspd:18,bsz:4,spread:0,color:'#69f0ae'},
  sniper:{id:'sniper',name:'Sniper',desc:'1 tiro mata qualquer um.',price:800,damage:99,ammo:10,cooldown:35,bspd:22,bsz:4.5,spread:0,color:'#ea80fc'},
  minigun:{id:'minigun',name:'Minigun',desc:'Cadência máxima!',price:1200,damage:1,ammo:120,cooldown:2,bspd:13,bsz:4,spread:0.15,color:'#ff5252'}
};
const BONUSES={
  shield:{id:'shield',name:'Escudo +25HP',desc:'Vida máxima +25.',price:150,type:'passive',icon:'🛡',maxStack:3},
  speedBoots:{id:'speedBoots',name:'Botas',desc:'Velocidade +1.',price:120,type:'passive',icon:'⚡',maxStack:2},
  fastReload:{id:'fastReload',name:'Recarga Rápida',desc:'Recarga -30%.',price:180,type:'passive',icon:'🔄',maxStack:2},
  extraAmmo:{id:'extraAmmo',name:'Colete Munição',desc:'Capacidade +50%.',price:200,type:'passive',icon:'🔫',maxStack:2},
  coinBoost:{id:'coinBoost',name:'Multiplicador',desc:'Dobro de moedas.',price:300,type:'passive',icon:'🪙',maxStack:1},
  healPack:{id:'healPack',name:'Kit Médico',desc:'Cura 50HP ao iniciar.',price:100,type:'consumable',icon:'❤️',maxStack:99},
  ammoBox:{id:'ammoBox',name:'Caixa Munição',desc:'Recarga cheia ao iniciar.',price:80,type:'consumable',icon:'📦',maxStack:99}
};
const UPGRADES={
  bulletDmg:{id:'bulletDmg',name:'Dano +1',desc:'Cada bala causa mais dano.',price:250,maxLevel:3},
  armorPlate:{id:'armorPlate',name:'Armadura',desc:'Reduz dano em 20%.',price:300,maxLevel:3},
  critChance:{id:'critChance',name:'Crítico',desc:'+15% chance crítico.',price:350,maxLevel:3}
};

let players=JSON.parse(localStorage.getItem('dz4_players')||'[]');
let currentPlayer=null;
let prevScreenId='screen-lobby';
let G={};
let animFrame=null;
let keys={};
let mouseX=340,mouseY=280;
let shootHeld=false;
let paused=false;
let currentShopTab='weapons';
let bgParticles=[];
let bgScroll=0;
let bgObjects=[];
let titleFlicker=0;
// ===== GAMEPAD (universal controller) state =====
const GP_DEADZONE=0.3;
let gpMoveX=0,gpMoveY=0,gpAimActive=false,gpAimX=0,gpAimY=0,gpShootHeld=false;
let gpPrev={};
let navIndex=0;
let navItemsCache=[];
let gpWasConnected=false;

function savePlayers(){localStorage.setItem('dz4_players',JSON.stringify(players));}
function getPlayer(n){return players.find(p=>p.name===n);}
function upsertPlayer(n){
  let p=getPlayer(n);
  if(!p){p={name:n,score:0,maxLevel:1,completedLevels:[],coins:0,weapons:{pistol:true},equippedWeapon:'pistol',bonuses:{},upgrades:{bulletDmg:0,armorPlate:0,critChance:0},consumables:{healPack:0,ammoBox:0}};players.push(p);}
  if(!p.coins)p.coins=0;if(!p.weapons)p.weapons={pistol:true};if(!p.equippedWeapon)p.equippedWeapon='pistol';
  if(!p.bonuses)p.bonuses={};if(!p.upgrades)p.upgrades={bulletDmg:0,armorPlate:0,critChance:0};if(!p.consumables)p.consumables={healPack:0,ammoBox:0};
  savePlayers();return p;
}
function getPlayerStats(){
  const p=currentPlayer;const w=WEAPONS[p.equippedWeapon]||WEAPONS.pistol;
  let maxHealth=100,speed=4,reloadMult=1,ammoMult=1,coinMult=1,dmgBonus=0,armorPct=0,critChance=0;
  if(p.bonuses.shield)maxHealth+=25*(p.bonuses.shield||0);
  if(p.bonuses.speedBoots)speed+=1*(p.bonuses.speedBoots||0);
  if(p.bonuses.fastReload)reloadMult*=Math.pow(0.7,p.bonuses.fastReload||0);
  if(p.bonuses.extraAmmo)ammoMult*=(p.bonuses.extraAmmo>=1?1.5:1);
  if(p.bonuses.coinBoost)coinMult*=2;
  dmgBonus=(p.upgrades.bulletDmg||0);armorPct=(p.upgrades.armorPlate||0)*0.2;critChance=(p.upgrades.critChance||0)*0.15;
  return{maxHealth,speed,reloadMult,ammoMult,coinMult,dmgBonus,armorPct,critChance,maxAmmo:Math.round(w.ammo*ammoMult),reloadMax:Math.round(90*reloadMult),weapon:w};
}

let audioCtx=null;
function getAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return audioCtx;}
function playTone(f,d,t='square',v=0.07){const a=getAudio();if(!a)return;try{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sndShoot(){playTone(900,.05,'sawtooth',.04);}
function sndHit(){playTone(180,.09,'square',.06);}
function sndKill(){playTone(440,.1,'square',.07);setTimeout(()=>playTone(600,.07,'square',.05),90);}
function sndDie(){playTone(100,.5,'sawtooth',.1);}
function sndWin(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f,.18,'sine',.08),i*110));}
function sndChallenge(){[660,880,1100].forEach((f,i)=>setTimeout(()=>playTone(f,.14,'sine',.09),i*80));}
function sndCoin(){playTone(1200,.06,'sine',.05);setTimeout(()=>playTone(1500,.05,'sine',.04),60);}
function sndBuy(){[400,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,.08,'sine',.06),i*60));}

function showScreen(id){
  const prev=document.querySelector('#game .screen:not(.hidden)');
  if(prev)prevScreenId=prev.id;
  document.querySelectorAll('#game .screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id==='screen-ranking')buildRanking();
  if(id==='screen-lobby'&&currentPlayer){buildLobby();startLobbyBG();}
  if(id==='screen-shop'&&currentPlayer)buildShop();
  if(id==='screen-login')startTitleBG();
  gpRefreshNav();
}

const bgc=document.getElementById('bgc');
const bgx=bgc.getContext('2d');
const titlec=document.getElementById('titlec');
const tc=titlec.getContext('2d');
const lobbyc=document.getElementById('lobbyc');
const lc=lobbyc.getContext('2d');
let bgAnim=null;

function initBGParticles(){
  bgParticles=[];
  for(let i=0;i<40;i++){bgParticles.push({x:Math.random()*680,y:Math.random()*560,vy:-(Math.random()*0.4+0.1),vx:(Math.random()-.5)*0.2,r:Math.random()*2+1,life:Math.random()*200+100,maxLife:300,type:Math.random()<0.3?'ember':'ash'});}
}

function drawApocalypticBG(ctx,W,H,t){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080508';ctx.fillRect(0,0,W,H);
  // dark red sky glow at horizon
  for(let i=0;i<3;i++){
    ctx.fillStyle=`rgba(120,20,10,${0.04+i*0.02})`;
    ctx.fillRect(0,H*0.35-i*30,W,H*0.25+i*30);
  }
  // moon (cracked, eerie)
  ctx.fillStyle='#4a4030';ctx.beginPath();ctx.arc(560,60,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a5040';ctx.beginPath();ctx.arc(555,58,22,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#2a2018';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(548,52);ctx.lineTo(554,64);ctx.moveTo(562,55);ctx.lineTo(558,68);ctx.stroke();
  // clouds of smoke
  function smokeCloud(x,y,r,a){ctx.fillStyle=`rgba(30,20,20,${a})`;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
  const sc=Math.sin(t*0.003)*10;
  smokeCloud(100+sc,90,55,.6);smokeCloud(140+sc,80,40,.5);smokeCloud(80+sc,100,35,.45);
  smokeCloud(400-sc,70,60,.55);smokeCloud(450-sc,85,45,.5);
  smokeCloud(580+sc*.5,100,50,.5);smokeCloud(620+sc*.5,88,38,.45);
  // ruined buildings silhouettes
  function building(x,y,w,h,col){
    ctx.fillStyle=col;ctx.fillRect(x,y,w,h);
    // broken edges
    ctx.fillStyle='#080508';
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w*.25,y-8);ctx.lineTo(x+w*.4,y);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(x+w*.6,y);ctx.lineTo(x+w*.75,y-12);ctx.lineTo(x+w,y);ctx.closePath();ctx.fill();
    // windows (dark, some with orange glow)
    for(let wy=y+10;wy<y+h-10;wy+=20){
      for(let wx=x+6;wx<x+w-6;wx+=14){
        const glow=Math.random()<0.06;
        ctx.fillStyle=glow?'#6a3000':'#0d0d10';
        ctx.fillRect(wx,wy,8,10);
        if(glow){ctx.fillStyle='rgba(200,80,0,0.15)';ctx.fillRect(wx-2,wy-2,12,14);}
      }
    }
  }
  building(10,180,60,380,'#110d0d');
  building(55,230,45,330,'#0e0a0a');
  building(120,150,80,410,'#130f0f');
  building(180,200,35,360,'#0f0b0b');
  building(480,160,75,400,'#110d0d');
  building(540,210,50,350,'#0e0a0a');
  building(600,140,80,420,'#130f0f');
  // foreground rubble
  ctx.fillStyle='#151010';
  ctx.beginPath();ctx.moveTo(0,460);ctx.lineTo(40,445);ctx.lineTo(80,455);ctx.lineTo(120,440);ctx.lineTo(160,452);ctx.lineTo(200,443);ctx.lineTo(250,460);ctx.lineTo(0,460);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(430,460);ctx.lineTo(470,445);ctx.lineTo(510,452);ctx.lineTo(550,440);ctx.lineTo(600,448);ctx.lineTo(640,455);ctx.lineTo(680,460);ctx.lineTo(680,560);ctx.lineTo(0,560);ctx.lineTo(0,460);ctx.closePath();ctx.fill();
  // broken fence posts
  ctx.strokeStyle='#1a1010';ctx.lineWidth=3;
  for(let fx=0;fx<680;fx+=40){const lean=(Math.sin(fx)*0.15);ctx.save();ctx.translate(fx+20,440);ctx.rotate(lean);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-35);ctx.stroke();ctx.restore();}
  ctx.strokeStyle='#1a1010';ctx.lineWidth=1;
  for(let fx=0;fx<680;fx+=40){ctx.beginPath();ctx.moveTo(fx,420);ctx.lineTo(fx+40,420);ctx.stroke();}
  // particles (ash, embers)
  bgParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){p.x=Math.random()*680;p.y=H+5;p.life=p.maxLife;p.vy=-(Math.random()*0.4+0.1);}
    const a=Math.min(1,p.life/40)*0.7;
    if(p.type==='ember'){ctx.fillStyle=`rgba(255,120,20,${a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    else{ctx.fillStyle=`rgba(150,130,120,${a*0.5})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.8,0,Math.PI*2);ctx.fill();}
  });
}

function gpBtnDown(gp,i){return !!(gp.buttons[i]&&gp.buttons[i].pressed);}
function gpBtnEdge(gp,i){const now=gpBtnDown(gp,i);const was=!!gpPrev[i];return now&&!was;}

// Gameplay polling: left stick/D-pad = move, right stick = aim, RT/RB/A = shoot, X = reload, Start/B = pause
function gpGameplayPoll(gp){
  let lx=gp.axes[0]||0,ly=gp.axes[1]||0;
  gpMoveX=Math.abs(lx)>GP_DEADZONE?lx:0;
  gpMoveY=Math.abs(ly)>GP_DEADZONE?ly:0;
  if(gpBtnDown(gp,14))gpMoveX=-1; // D-pad left
  if(gpBtnDown(gp,15))gpMoveX=1;  // D-pad right
  if(gpBtnDown(gp,12))gpMoveY=-1; // D-pad up
  if(gpBtnDown(gp,13))gpMoveY=1;  // D-pad down
  const rx=gp.axes[2]||0,ry=gp.axes[3]||0;
  const rmag=Math.sqrt(rx*rx+ry*ry);
  if(rmag>GP_DEADZONE){gpAimActive=true;gpAimX=rx/rmag;gpAimY=ry/rmag;}else gpAimActive=false;
  const rt=gp.buttons[7];
  gpShootHeld=(rt&&(rt.pressed||rt.value>0.3))||gpBtnDown(gp,0)||gpBtnDown(gp,5);
  if(gpBtnEdge(gp,2)){getAudio();startReload();} // X / Square = reload
}

// Spatial menu navigation: D-pad/left stick to move focus, A=confirm, B=back, Start=pause/resume
function getNavItems(){
  const overlay=document.getElementById('pause-overlay');
  if(!overlay.classList.contains('hidden'))return Array.from(overlay.querySelectorAll('button'));
  const screen=document.querySelector('#game .screen:not(.hidden)');
  if(!screen)return [];
  switch(screen.id){
    case 'screen-login':
      return [document.getElementById('input-name'),document.getElementById('btn-login'),document.getElementById('btn-show-rank')];
    case 'screen-lobby':
      return [...screen.querySelectorAll('.level-btn.unlocked'),document.getElementById('btn-shop'),document.getElementById('btn-lobby-rank'),document.getElementById('btn-change-player')];
    case 'screen-ranking':
      return [document.getElementById('btn-rank-back')];
    case 'screen-shop':
      return [...screen.querySelectorAll('.shop-tab'),...screen.querySelectorAll('.shop-item button:not([disabled])'),document.getElementById('btn-shop-back')];
    case 'screen-gameover':
    case 'screen-win':
      return Array.from(screen.querySelectorAll('button'));
    default:
      return [];
  }
}
function gpApplyFocus(){
  document.querySelectorAll('.gp-focus').forEach(el=>el.classList.remove('gp-focus'));
  const el=navItemsCache[navIndex];
  if(el){el.classList.add('gp-focus');el.scrollIntoView({block:'nearest',inline:'nearest'});}
}
function gpRefreshNav(){
  navIndex=0;
  navItemsCache=getNavItems();
  if(gpWasConnected)gpApplyFocus();
}
function gpNavigate(dir){
  navItemsCache=getNavItems();
  if(!navItemsCache.length)return;
  if(navIndex>=navItemsCache.length)navIndex=0;
  const cur=navItemsCache[navIndex].getBoundingClientRect();
  const cx=cur.left+cur.width/2,cy=cur.top+cur.height/2;
  let best=-1,bestDist=Infinity;
  navItemsCache.forEach((el,i)=>{
    if(i===navIndex)return;
    const r=el.getBoundingClientRect();
    const ex=r.left+r.width/2,ey=r.top+r.height/2;
    const dx=ex-cx,dy=ey-cy;
    let valid=false;
    if(dir==='up')valid=dy<-4;
    else if(dir==='down')valid=dy>4;
    else if(dir==='left')valid=dx<-4;
    else if(dir==='right')valid=dx>4;
    if(!valid)return;
    const primary=(dir==='up'||dir==='down')?Math.abs(dy):Math.abs(dx);
    const perp=(dir==='up'||dir==='down')?Math.abs(dx):Math.abs(dy);
    const dist=primary+perp*1.5;
    if(dist<bestDist){bestDist=dist;best=i;}
  });
  if(best>=0){navIndex=best;gpApplyFocus();}
}
function gpActivate(){
  navItemsCache=getNavItems();
  const el=navItemsCache[navIndex];
  if(!el)return;
  getAudio();
  if(el.tagName==='INPUT'){el.focus();return;}
  el.click();
}
function gpBack(){
  const overlay=document.getElementById('pause-overlay');
  if(!overlay.classList.contains('hidden')){togglePause();return;}
  const screen=document.querySelector('#game .screen:not(.hidden)');
  if(!screen)return;
  if(screen.id==='screen-ranking')document.getElementById('btn-rank-back').click();
  else if(screen.id==='screen-shop')document.getElementById('btn-shop-back').click();
}
let gpNavCooldown=0;
function gpMenuPoll(gp){
  navItemsCache=getNavItems();
  if(navIndex>=navItemsCache.length)navIndex=Math.max(0,navItemsCache.length-1);
  gpApplyFocus();
  const lx=gp.axes[0]||0,ly=gp.axes[1]||0;
  let dir=null;
  if(gpBtnDown(gp,12)||ly<-GP_DEADZONE)dir='up';
  else if(gpBtnDown(gp,13)||ly>GP_DEADZONE)dir='down';
  else if(gpBtnDown(gp,14)||lx<-GP_DEADZONE)dir='left';
  else if(gpBtnDown(gp,15)||lx>GP_DEADZONE)dir='right';
  if(dir){
    if(gpNavCooldown<=0){gpNavigate(dir);gpNavCooldown=14;}else gpNavCooldown--;
  }else gpNavCooldown=0;
  if(gpBtnEdge(gp,0))gpActivate();
  if(gpBtnEdge(gp,1))gpBack();
}

function gpLoop(){
  requestAnimationFrame(gpLoop);
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  let gp=null;
  for(let i=0;i<pads.length;i++){if(pads[i]){gp=pads[i];break;}}
  if(!gp){
    if(gpWasConnected){gpWasConnected=false;showGamepadIndicator(false);}
    gpMoveX=0;gpMoveY=0;gpAimActive=false;gpShootHeld=false;
    return;
  }
  if(!gpWasConnected){gpWasConnected=true;showGamepadIndicator(true);gpRefreshNav();}
  if(gpBtnEdge(gp,9)&&G.gameRunning)togglePause(); // Start = pause/resume
  if(G.gameRunning&&!paused){
    gpGameplayPoll(gp);
  }else{
    gpMoveX=0;gpMoveY=0;gpAimActive=false;gpShootHeld=false;
    gpMenuPoll(gp);
  }
  gpUpdatePrev(gp);
}
gpLoop();

// LEVEL BG ENVIRONMENTS — 10 distinct biomes (5 phases each)
function getLevelEnv(lvl){
  const envs=['city','farm','cemetery','mall','moon','snow','desert','sewer','volcano','forest'];
  return envs[Math.floor((lvl-1)/5)%envs.length];
}

function initLevelBG(lvl){
  bgObjects=[];bgScroll=0;
  const env=getLevelEnv(lvl);
  bgParticles=[];
  for(let i=0;i<40;i++){
    let type='ash';
    if(env==='city'||env==='farm')type=Math.random()<0.35?'ember':'ash';
    else if(env==='cemetery')type='wisp';
    else if(env==='mall')type='spark';
    else if(env==='moon')type='dust';
    else if(env==='snow')type='snow';
    else if(env==='desert')type='sand';
    else if(env==='sewer')type='wisp';
    else if(env==='volcano')type='ember';
    else if(env==='forest')type='ash';
    bgParticles.push({x:Math.random()*680,y:Math.random()*560,vy:-(Math.random()*0.4+0.1),vx:(Math.random()-.5)*0.25,r:Math.random()*2+1,life:Math.random()*200+100,maxLife:300,type});
  }
}

function drawLevelBG(ctx,lvl,t){
  const W=680,H=560;
  const env=getLevelEnv(lvl);
  if(env==='city')    drawBG_City(ctx,W,H,t);
  else if(env==='farm')      drawBG_Farm(ctx,W,H,t);
  else if(env==='cemetery')  drawBG_Cemetery(ctx,W,H,t);
  else if(env==='mall')      drawBG_Mall(ctx,W,H,t);
  else if(env==='moon')      drawBG_Moon(ctx,W,H,t);
  else if(env==='snow')      drawBG_Snow(ctx,W,H,t);
  else if(env==='desert')    drawBG_Desert(ctx,W,H,t);
  else if(env==='sewer')     drawBG_Sewer(ctx,W,H,t);
  else if(env==='volcano')   drawBG_Volcano(ctx,W,H,t);
  else if(env==='forest')    drawBG_Forest(ctx,W,H,t);
  // floating particles over every scene
  bgParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){p.x=Math.random()*W;p.y=H+5;p.life=p.maxLife;}
    const a=Math.min(1,p.life/40)*0.6;
    if(p.type==='ember'){ctx.fillStyle=`rgba(255,100,20,${a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    else if(p.type==='wisp'){ctx.fillStyle=`rgba(140,80,255,${a*0.7})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    else if(p.type==='spark'){ctx.fillStyle=`rgba(255,220,100,${a*0.8})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);ctx.fill();}
    else if(p.type==='dust'){ctx.fillStyle=`rgba(160,150,200,${a*0.35})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.2,0,Math.PI*2);ctx.fill();}
    else if(p.type==='snow'){ctx.fillStyle=`rgba(220,240,255,${a*0.9})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.8,0,Math.PI*2);ctx.fill();}
    else if(p.type==='sand'){ctx.fillStyle=`rgba(200,170,100,${a*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.1,0,Math.PI*2);ctx.fill();}
    else{ctx.fillStyle=`rgba(140,130,120,${a*0.45})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.7,0,Math.PI*2);ctx.fill();}
  });
}

/* ───────── CIDADE ───────── */
function drawBG_City(ctx,W,H,t){
  // Dark red apocalyptic sky
  const sky=ctx.createLinearGradient(0,0,0,H*.5);
  sky.addColorStop(0,'#0a0404');sky.addColorStop(0.5,'#200808');sky.addColorStop(1,'#3a1008');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Blood moon
  ctx.fillStyle='#4a1a10';ctx.beginPath();ctx.arc(560,58,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6a2818';ctx.beginPath();ctx.arc(556,55,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(180,60,20,0.15)';ctx.beginPath();ctx.arc(556,55,42,0,Math.PI*2);ctx.fill();
  // Distant skyscrapers silhouettes
  const blds=[[0,120,55,440],[48,160,48,400],[90,100,70,460],[155,185,38,375],[450,130,65,430],[510,170,55,390],[560,90,80,470],[635,155,45,405]];
  blds.forEach(([x,y,w,h])=>{
    ctx.fillStyle='#0e0808';ctx.fillRect(x,y,w,h);
    // antennae
    ctx.fillStyle='#0c0606';ctx.fillRect(x+w/2-1,y-15,2,15);
    ctx.fillStyle='rgba(255,50,50,0.7)';if(Math.sin(t*0.05+x)<0.9)ctx.fillRect(x+w/2-2,y-16,4,4);
    // windows
    for(let wy=y+8;wy<y+h-10;wy+=20){for(let wx=x+5;wx<x+w-5;wx+=13){
      const glow=Math.sin(t*0.03+wx*0.1+wy*0.07)<-0.8;
      ctx.fillStyle=glow?'#7a3800':'#0d0b0e';ctx.fillRect(wx,wy,7,10);
    }}
  });
  // Smoke plumes
  for(let si=0;si<5;si++){
    const sx=80+si*130+Math.sin(t*0.003+si)*18;
    const a=0.12+Math.sin(t*0.004+si)*0.05;
    ctx.fillStyle=`rgba(40,25,20,${a})`;
    ctx.beginPath();ctx.ellipse(sx,130+si*8,55+si*5,28,0,0,Math.PI*2);ctx.fill();
  }
  // Ground — cracked asphalt
  ctx.fillStyle='#120d0c';ctx.fillRect(0,390,W,H-390);
  ctx.strokeStyle='#1a1210';ctx.lineWidth=1.5;
  for(let ci=0;ci<10;ci++){
    ctx.beginPath();ctx.moveTo(ci*70,390);ctx.bezierCurveTo(ci*70+20,400,ci*70+35,408,ci*70+60,395);ctx.stroke();
  }
  // Road center line
  ctx.strokeStyle='rgba(80,60,50,0.25)';ctx.lineWidth=4;ctx.setLineDash([35,22]);
  ctx.beginPath();ctx.moveTo(0,465);ctx.lineTo(W,465);ctx.stroke();ctx.setLineDash([]);
  // Busted cars silhouette
  [[55,405,90,30],[290,400,85,32],[500,402,88,30]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#0f0b0a';ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
    ctx.fillStyle='#0c0907';ctx.beginPath();ctx.roundRect(x+8,y-14,w-22,18,3);ctx.fill();
    // smashed windows
    ctx.fillStyle='#1a1410';ctx.fillRect(x+12,y-12,w-30,12);
  });
  // Fire barrel
  ctx.fillStyle='#1a1208';ctx.fillRect(340,398,20,28);
  const fireA=0.6+Math.sin(t*0.2)*0.3;
  ctx.fillStyle=`rgba(255,140,20,${fireA})`;ctx.beginPath();ctx.ellipse(350,396,8,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,220,60,${fireA*0.7})`;ctx.beginPath();ctx.ellipse(350,390,4,8,0,0,Math.PI*2);ctx.fill();
  // Broken streetlamps
  [[130,340,5,70],[390,338,5,72],[580,342,5,68]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#151010';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#1a1515';ctx.beginPath();ctx.arc(x+w/2,y,10,Math.PI,0);ctx.fill();
    if(Math.sin(t*0.12+x)<0.5){ctx.fillStyle='rgba(255,240,180,0.15)';ctx.beginPath();ctx.arc(x+w/2,y-2,16,0,Math.PI*2);ctx.fill();}
  });
}

/* ───────── FAZENDA ───────── */
function drawBG_Farm(ctx,W,H,t){
  // Eerie green-yellow overcast sky
  const sky=ctx.createLinearGradient(0,0,0,H*.55);
  sky.addColorStop(0,'#080b04');sky.addColorStop(0.5,'#141808');sky.addColorStop(1,'#1e2408');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Sickly full moon
  ctx.fillStyle='#30350a';ctx.beginPath();ctx.arc(100,70,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#44480e';ctx.beginPath();ctx.arc(97,67,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,100,10,0.2)';ctx.beginPath();ctx.arc(97,67,42,0,Math.PI*2);ctx.fill();
  // Distant dead forest
  for(let ti=0;ti<20;ti++){
    const tx=ti*35+Math.sin(ti*1.3)*8;const th=80+Math.random()*60;
    ctx.fillStyle='#0e1208';ctx.fillRect(tx,240-th,5,th);
    // bare branches
    ctx.strokeStyle='#0e1208';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(tx+2,245-th);ctx.lineTo(tx-10,245-th-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(tx+2,245-th);ctx.lineTo(tx+12,245-th-14);ctx.stroke();
  }
  // Farmhouse ruin silhouette
  ctx.fillStyle='#0c1006';ctx.fillRect(480,210,120,180);
  ctx.fillStyle='#0a0e04';ctx.beginPath();ctx.moveTo(475,210);ctx.lineTo(540,170);ctx.lineTo(605,210);ctx.closePath();ctx.fill();
  // broken window lights
  if(Math.sin(t*0.07)<0.2){ctx.fillStyle='rgba(100,140,30,0.18)';ctx.fillRect(500,235,30,25);ctx.fillRect(550,238,25,22);}
  // Barn silhouette
  ctx.fillStyle='#0e1208';ctx.fillRect(10,250,90,140);
  ctx.fillStyle='#0b0f06';ctx.beginPath();ctx.moveTo(5,250);ctx.lineTo(55,215);ctx.lineTo(105,250);ctx.closePath();ctx.fill();
  // Old silo
  ctx.fillStyle='#0c1008';ctx.fillRect(135,260,30,130);
  ctx.fillStyle='#0a0e06';ctx.beginPath();ctx.arc(150,260,15,-Math.PI,0);ctx.fill();
  // Dirt ground with mud patches
  ctx.fillStyle='#0f1208';ctx.fillRect(0,390,W,H-390);
  // Mud patches
  [[30,410,60,12],[160,405,80,14],[350,408,70,12],[500,412,90,14]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#0c0f06';ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  });
  // Fence posts & wire
  ctx.strokeStyle='#151a08';ctx.lineWidth=1;
  for(let fi=0;fi<14;fi++){
    const fx=fi*50+5;ctx.fillStyle='#1a2008';ctx.fillRect(fx,380,5,40);
    ctx.beginPath();ctx.moveTo(fx,388);ctx.lineTo(fx+50,390);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,397);ctx.lineTo(fx+50,398);ctx.stroke();
  }
  // Scarecrow
  ctx.fillStyle='#1a2008';ctx.fillRect(305,355,4,50);ctx.fillRect(290,365,30,4);
  ctx.fillStyle='#2a3010';ctx.beginPath();ctx.arc(307,350,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff2020';ctx.beginPath();ctx.arc(304,348,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(310,348,2,0,Math.PI*2);ctx.fill();
  // Fireflies
  for(let fi=0;fi<12;fi++){
    const fxa=fi*55+Math.sin(t*0.04+fi)*30;const fya=300+Math.cos(t*0.05+fi*0.7)*40;
    const fa=Math.sin(t*0.1+fi)*0.5+0.5;
    ctx.fillStyle=`rgba(150,220,50,${fa*0.8})`;ctx.beginPath();ctx.arc(fxa,fya,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(150,220,50,${fa*0.2})`;ctx.beginPath();ctx.arc(fxa,fya,6,0,Math.PI*2);ctx.fill();
  }
  // Fog wisps on ground
  for(let fgi=0;fgi<5;fgi++){
    const fgx=fgi*140+Math.sin(t*0.004+fgi)*25;
    ctx.fillStyle=`rgba(30,40,15,0.22)`;
    ctx.beginPath();ctx.ellipse(fgx,400,75,18,0,0,Math.PI*2);ctx.fill();
  }
}

/* ───────── CEMITÉRIO ───────── */
function drawBG_Cemetery(ctx,W,H,t){
  // Deep purple-black sky
  const sky=ctx.createLinearGradient(0,0,0,H*.5);
  sky.addColorStop(0,'#04020a');sky.addColorStop(0.5,'#0c0618');sky.addColorStop(1,'#160828');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Stars
  for(let si=0;si<40;si++){
    const sa=Math.sin(t*0.02+si)*0.5+0.5;
    ctx.fillStyle=`rgba(200,180,255,${sa*0.7})`;
    ctx.beginPath();ctx.arc(si*17+7,si*4+10,0.8+sa*0.5,0,Math.PI*2);ctx.fill();
  }
  // Cracked eerie moon
  ctx.fillStyle='#2a1a3a';ctx.beginPath();ctx.arc(540,70,32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2450';ctx.beginPath();ctx.arc(536,66,26,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1a0e28';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(530,60);ctx.lineTo(536,74);ctx.moveTo(543,64);ctx.lineTo(539,78);ctx.stroke();
  ctx.fillStyle='rgba(100,60,180,0.18)';ctx.beginPath();ctx.arc(536,66,52,0,Math.PI*2);ctx.fill();
  // Dead trees
  function deadTree(x,y,h){
    ctx.fillStyle='#110820';ctx.fillRect(x-3,y-h,6,h);
    ctx.strokeStyle='#110820';ctx.lineWidth=2;
    [-30,-15,15,28].forEach((ang,i)=>{
      const l=20+i*5;ctx.beginPath();ctx.moveTo(x,y-h+h*.3+i*12);
      ctx.lineTo(x+Math.cos(ang*Math.PI/180)*l,y-h+h*.3+i*12-Math.sin(Math.abs(ang)*Math.PI/180)*l*.6);ctx.stroke();
    });
  }
  [40,120,200,480,560,640].forEach((x,i)=>deadTree(x,390,80+i*15));
  // Mausoleum
  ctx.fillStyle='#0e0818';ctx.fillRect(240,240,200,150);
  ctx.fillStyle='#0c0616';ctx.beginPath();ctx.moveTo(235,240);ctx.lineTo(340,190);ctx.lineTo(445,240);ctx.closePath();ctx.fill();
  ctx.fillStyle='#0a0512';ctx.fillRect(310,290,60,100);// door
  ctx.strokeStyle='#180f28';ctx.lineWidth=2;ctx.strokeRect(310,290,60,100);
  // Cross on top
  ctx.fillStyle='#180f28';ctx.fillRect(336,178,8,30);ctx.fillRect(326,188,28,8);
  // Tombstones various shapes
  const stones=[[30,370,22,35,0],[80,375,18,30,1],[155,368,24,38,0],[360,372,20,32,1],[550,370,22,36,0],[610,374,18,28,1],[650,368,25,40,0]];
  stones.forEach(([x,y,w,h,r])=>{
    ctx.fillStyle='#0e0a1a';
    if(r===0){ctx.beginPath();ctx.roundRect(x,y-h,w,h,w/2,w/2,0,0);ctx.fill();}
    else{ctx.fillRect(x,y-h,w,h);ctx.fillRect(x,y-h,w,5);}
    // Cracks
    ctx.strokeStyle='#1a1228';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+w*.4,y-h+5);ctx.lineTo(x+w*.6,y-h*.6);ctx.stroke();
    // Glowing runes
    const ga=Math.sin(t*0.05+x)*0.4+0.5;
    ctx.fillStyle=`rgba(140,80,255,${ga*0.4})`;ctx.fillRect(x+w*.35,y-h*.45,w*.3,3);
  });
  // Dark ground
  ctx.fillStyle='#0a0614';ctx.fillRect(0,390,W,H-390);
  // Grave mounds
  [[50,398,55,12],[180,394,60,14],[360,396,50,12],[530,397,58,13]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#0d0918';ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  });
  // Floating orbs (will-o-wisps)
  for(let wi=0;wi<6;wi++){
    const wx=wi*110+Math.sin(t*0.03+wi*1.1)*35;
    const wy=340+Math.cos(t*0.04+wi*.8)*25;
    const wa=Math.sin(t*0.08+wi)*0.5+0.5;
    ctx.fillStyle=`rgba(140,80,255,${wa*0.6})`;ctx.beginPath();ctx.arc(wx,wy,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(180,120,255,${wa*0.15})`;ctx.beginPath();ctx.arc(wx,wy,16,0,Math.PI*2);ctx.fill();
  }
  // Rising ground fog
  for(let fgi=0;fgi<6;fgi++){
    const fgx=fgi*120+Math.sin(t*0.005+fgi)*30;
    ctx.fillStyle=`rgba(60,20,100,0.18)`;
    ctx.beginPath();ctx.ellipse(fgx,405,85,20,0,0,Math.PI*2);ctx.fill();
  }
}

/* ───────── SHOPPING ───────── */
function drawBG_Mall(ctx,W,H,t){
  // Interior — flickering fluorescent lighting
  const bright=0.82+Math.sin(t*0.15)*0.06+Math.sin(t*0.8)*0.02;
  ctx.fillStyle=`rgb(${Math.floor(12*bright)},${Math.floor(10*bright)},${Math.floor(8*bright)})`;
  ctx.fillRect(0,0,W,H);
  // Ceiling tiles
  ctx.fillStyle='#0f0e0d';
  for(let cx2=0;cx2<W;cx2+=60){for(let cy2=0;cy2<130;cy2+=40){ctx.fillRect(cx2,cy2,58,38);}}
  // Fluorescent lights (flickering)
  for(let li=0;li<6;li++){
    const lx=li*115+30;
    const flk=Math.sin(t*0.12+li*2.3)>0.92?0:1;
    ctx.fillStyle=`rgba(200,220,255,${0.18*flk*bright})`;
    ctx.fillRect(lx,0,70,8);
    ctx.fillStyle=`rgba(200,220,255,${0.08*flk*bright})`;
    ctx.beginPath();ctx.ellipse(lx+35,0,50,60,0,0,Math.PI*2);ctx.fill();
  }
  // Back wall — ruined storefronts
  const stores=[
    {x:0,w:130,col:'#0e0c0b',name:'ZARA',sign:'#3a1a10'},
    {x:130,w:110,col:'#0c0e0b',name:'APPLE',sign:'#102010'},
    {x:240,w:140,col:'#0d0b0e',name:'McDead',sign:'#1a1020'},
    {x:380,w:120,col:'#0e0c08',name:'CINEMA',sign:'#1a1808'},
    {x:500,w:180,col:'#0b0d0e',name:'SPORT',sign:'#0e1820'},
  ];
  stores.forEach(s=>{
    ctx.fillStyle=s.col;ctx.fillRect(s.x,130,s.w,260);
    // Sign board
    ctx.fillStyle=s.sign;ctx.fillRect(s.x+8,138,s.w-16,30);
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(s.name,s.x+s.w/2,158);ctx.textAlign='left';
    // Broken glass/shutter
    ctx.strokeStyle='#1a1510';ctx.lineWidth=1;
    for(let gi=s.x+10;gi<s.x+s.w-10;gi+=18){ctx.beginPath();ctx.moveTo(gi,175);ctx.lineTo(gi,385);ctx.stroke();}
    ctx.strokeStyle=`rgba(80,70,60,0.4)`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s.x+20,210);ctx.lineTo(s.x+s.w*.6,260);ctx.moveTo(s.x+s.w*.5,195);ctx.lineTo(s.x+15,280);ctx.stroke();
  });
  // Floor — polished tiles (cracked)
  ctx.fillStyle='#111008';ctx.fillRect(0,390,W,H-390);
  for(let ti=0;ti<12;ti++){for(let tj=0;tj<4;tj++){
    ctx.strokeStyle='rgba(30,28,25,0.8)';ctx.lineWidth=1;
    ctx.strokeRect(ti*58,390+tj*44,57,43);
    // Reflection shimmer
    const ref=Math.sin(t*0.02+ti+tj)*0.04+0.04;
    ctx.fillStyle=`rgba(180,170,150,${ref})`;ctx.fillRect(ti*58+4,390+tj*44+4,20,8);
  }}
  // Shopping carts wreckage
  [[45,375,35,30],[220,370,35,32],[440,372,35,30],[600,374,35,28]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#141210';ctx.fillRect(x,y,w,h);ctx.fillRect(x-3,y+h,5,10);ctx.fillRect(x+w-2,y+h,5,10);
    ctx.strokeStyle='#1e1c18';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  });
  // Mannequins knocked over
  [[150,380],[320,375],[510,378]].forEach(([mx,my])=>{
    ctx.fillStyle='#181614';ctx.fillRect(mx,my,8,35);ctx.beginPath();ctx.arc(mx+4,my-6,8,0,Math.PI*2);ctx.fill();
    // fallen arm
    ctx.fillRect(mx-12,my+8,12,5);
  });
  // Emergency exit sign (flickering red)
  const exitA=Math.sin(t*0.09)>0.7?0.9:0.4;
  ctx.fillStyle=`rgba(200,30,30,${exitA})`;ctx.fillRect(310,140,60,20);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('SAÍDA',340,154);ctx.textAlign='left';
  // Escalator frozen
  ctx.fillStyle='#111008';ctx.beginPath();ctx.moveTo(180,390);ctx.lineTo(230,280);ctx.lineTo(255,280);ctx.lineTo(205,390);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#1a1810';ctx.lineWidth=2;
  for(let es=0;es<8;es++){const ep=es/8;ctx.beginPath();ctx.moveTo(180+ep*50,390-ep*110);ctx.lineTo(200+ep*50,390-ep*110);ctx.stroke();}
}

/* ───────── LUA ───────── */
function drawBG_Moon(ctx,W,H,t){
  // Deep space — black with nebula hints
  ctx.fillStyle='#00000a';ctx.fillRect(0,0,W,H);
  // Nebula glow
  ctx.fillStyle='rgba(10,5,40,0.9)';ctx.fillRect(0,0,W,H*.6);
  for(let nb=0;nb<3;nb++){
    const nba=0.04+Math.sin(t*0.005+nb)*0.02;
    ctx.fillStyle=`rgba(${40+nb*15},${10+nb*5},${80+nb*20},${nba})`;
    ctx.beginPath();ctx.ellipse(120+nb*200,80+nb*20,180+nb*40,90+nb*20,nb*.3,0,Math.PI*2);ctx.fill();
  }
  // Stars (many)
  for(let si=0;si<80;si++){
    const sx=((si*137+11)%680);const sy=((si*97+13)%280);
    const sa=Math.sin(t*0.015+si)*0.4+0.6;
    ctx.fillStyle=`rgba(220,220,255,${sa})`;
    ctx.beginPath();ctx.arc(sx,sy,0.5+Math.random()*1,0,Math.PI*2);ctx.fill();
  }
  // Earth in background (blue glow)
  ctx.fillStyle='#041830';ctx.beginPath();ctx.arc(80,90,50,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#062844';ctx.beginPath();ctx.arc(78,87,44,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(30,80,150,0.6)';ctx.beginPath();ctx.arc(75,88,22,0,Math.PI*2);ctx.fill();// ocean
  ctx.fillStyle='rgba(0,150,40,0.5)';ctx.beginPath();ctx.ellipse(88,82,10,14,-0.4,0,Math.PI*2);ctx.fill();// continent

/* ───────── NEVE ───────── */
function drawBG_Snow(ctx,W,H,t){

    // Snow on top

    // Dark windows
    for(let wy=y+18;wy<y+h-10;wy+=22){for(let wx=x+6;wx<x+w-6;wx+=14){
      const glow=Math.sin(t*0.04+wx*0.1+wy*0.08)<-0.7;
      ctx.fillStyle=glow?'#1a3050':'#080e18';ctx.fillRect(wx,wy,8,10);
    }}

  // Snow-covered ground

  // Snow drifts

  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // Frozen vehicles
  [[40,395,85,30],[300,390,88,32],[520,393,82,30]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#0e1820';ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
    ctx.fillStyle='#0b1318';ctx.beginPath();ctx.roundRect(x+8,y-13,w-22,17,3);ctx.fill();
    // Snow on roof
    ctx.fillStyle='rgba(200,220,235,0.25)';ctx.fillRect(x+8,y-13,w-22,5);
  });
  // Bare frozen trees
  for(let ti=0;ti<8;ti++){
    const tx=70+ti*82+Math.sin(ti)*15;
    ctx.fillStyle='#0c1520';ctx.fillRect(tx,320,5,80);
    ctx.strokeStyle='#0c1520';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(tx+2,320);ctx.lineTo(tx-15,290);ctx.stroke();
    ctx.beginPath();ctx.moveTo(tx+2,320);ctx.lineTo(tx+16,295);ctx.stroke();

    // Snow on branches

    ctx.fillStyle=`rgba(210,230,245,${sa})`;ctx.beginPath();ctx.arc(sx,sy,0.8+si%3*.4,0,Math.PI*2);ctx.fill();

}

  ctx.fillStyle='rgba(180,80,0,0.15)';ctx.beginPath();ctx.arc(337,57,60,0,Math.PI*2);ctx.fill();
  // Heat shimmer rays
  for(let ri=0;ri<8;ri++){

    ctx.beginPath();ctx.moveTo(337+Math.cos(ra)*35,57+Math.sin(ra)*35);
    ctx.lineTo(337+Math.cos(ra)*rdist,57+Math.sin(ra)*rdist);ctx.stroke();
  }
  // Ancient ruined walls
  [[0,200,55,360],[50,230,45,330],[155,215,35,345],[440,205,70,355],[500,235,50,325],[580,195,100,365]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#1e1000';ctx.fillRect(x,y,w,h);

    for(let bi=x;bi<x+w;bi+=12){const bh=5+Math.sin(bi*0.4)*5;ctx.fillRect(bi,y,8,bh);}
    // Cracks
    ctx.strokeStyle='rgba(10,5,0,0.8)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+w*.3,y+10);ctx.lineTo(x+w*.25,y+50);ctx.lineTo(x+w*.35,y+80);ctx.stroke();
    // Windows/openings
    for(let wy=y+30;wy<y+h-10;wy+=25){for(let wx=x+5;wx<x+w-5;wx+=16){
      ctx.fillStyle='#0e0800';ctx.fillRect(wx,wy,8,12);
    }}
  });
  // Sand dunes
  const dune=ctx.createLinearGradient(0,365,0,H);
  dune.addColorStop(0,'#2a1800');dune.addColorStop(0.4,'#1e1000');dune.addColorStop(1,'#160c00');
  ctx.fillStyle=dune;ctx.fillRect(0,365,W,H-365);
  // Dune silhouettes
  ctx.fillStyle='#1e1000';
  ctx.beginPath();ctx.moveTo(0,400);
  ctx.bezierCurveTo(80,360,200,400,300,370);
  ctx.bezierCurveTo(400,340,500,390,600,365);
  ctx.lineTo(680,370);ctx.lineTo(680,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // Sand surface texture
  ctx.strokeStyle='rgba(40,22,0,0.6)';ctx.lineWidth=1;
  for(let li=0;li<18;li++){
    ctx.beginPath();ctx.moveTo(0,390+li*10);ctx.bezierCurveTo(200,385+li*10,450,395+li*10,680,388+li*10);ctx.stroke();
  }
  // Skulls on stakes
  [[110,360],[270,355],[430,360],[570,358]].forEach(([sx,sy])=>{
    ctx.fillStyle='#1c1000';ctx.fillRect(sx-1,sy,3,30);
    ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(sx,sy,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0e0800';ctx.fillRect(sx-4,sy-2,3,4);ctx.fillRect(sx+1,sy-2,3,4);
  });
  // Dried cacti
  for(let ci=0;ci<6;ci++){
    const cx2=60+ci*105+Math.sin(ci)*20;
    ctx.fillStyle='#1a0e00';ctx.fillRect(cx2,320,8,80);
    ctx.fillRect(cx2-18,335,20,7);ctx.fillRect(cx2+8,345,20,7);
    ctx.fillStyle='#120900';ctx.fillRect(cx2-18,320,8,15);ctx.fillRect(cx2+8,330,8,15);
  }
  // Heat shimmer at ground
  const heatA=Math.sin(t*0.06)*0.04+0.05;
  ctx.fillStyle=`rgba(180,80,0,${heatA})`;ctx.fillRect(0,355,W,30);
  // Blowing sand particles
  for(let si=0;si<20;si++){
    const sx=((si*89+t*1.2)%750)-40;const sy=380+si%8*12;
    ctx.fillStyle='rgba(180,130,60,0.35)';ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
  }
}

/* ───────── ESGOTO ───────── */
function drawBG_Sewer(ctx,W,H,t){
  // Deep underground — almost black green
  ctx.fillStyle='#030805';ctx.fillRect(0,0,W,H);
  // Damp stone ceiling
  const ceil=ctx.createLinearGradient(0,0,0,120);
  ceil.addColorStop(0,'#060e08');ceil.addColorStop(1,'#040a06');
  ctx.fillStyle=ceil;ctx.fillRect(0,0,W,120);
  // Stone bricks on ceiling
  ctx.strokeStyle='rgba(5,12,7,0.8)';ctx.lineWidth=1.5;
  for(let bx=0;bx<W;bx+=45){for(let by=0;by<100;by+=20){
    ctx.strokeRect(bx+(by%40?22:0),by,44,19);
  }}
  // Dripping water
  for(let di=0;di<10;di++){
    const dx=40+di*63+Math.sin(di)*10;
    const dy=115+((t*0.3+di*37)%80);
    const da=Math.min(1,(dy-115)/30);
    ctx.fillStyle=`rgba(30,80,40,${da*0.6})`;ctx.beginPath();ctx.ellipse(dx,dy,1.5,3,0,0,Math.PI*2);ctx.fill();
    if(dy>185){ctx.fillStyle='rgba(30,80,40,0.3)';ctx.beginPath();ctx.ellipse(dx,dy,5,2,0,0,Math.PI*2);ctx.fill();}
  }
  // Rusty pipes on walls
  ctx.strokeStyle='#0e1a10';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(0,180);ctx.lineTo(W,180);ctx.stroke();
  ctx.strokeStyle='#0a1408';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(0,195);ctx.lineTo(W,195);ctx.stroke();
  // Vertical pipes
  [[100,0,200],[250,0,180],[430,0,190],[600,0,185]].forEach(([x,y1,y2])=>{
    ctx.strokeStyle='#0c1a0e';ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
    ctx.strokeStyle='#0e2010';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
    // flange rings
    [y2-15,y2*.4].forEach(ry=>{ctx.strokeStyle='#121e12';ctx.lineWidth=14;ctx.beginPath();ctx.moveTo(x-1,ry);ctx.lineTo(x+1,ry+3);ctx.stroke();});
  });
  // Side walls with mossy bricks
  ctx.fillStyle='#050e07';
  for(let bx=0;bx<40;bx+=12){for(let by=200;by<H;by+=16){ctx.fillRect(bx,by,11,15);}}
  for(let bx=W-40;bx<W;bx+=12){for(let by=200;by<H;by+=16){ctx.fillRect(bx,by,11,15);}}
  ctx.fillStyle='rgba(10,30,12,0.5)';ctx.fillRect(0,200,40,H-200);ctx.fillRect(W-40,200,40,H-200);
  // Murky water channel
  const water=ctx.createLinearGradient(0,390,0,H);
  water.addColorStop(0,'#040f06');water.addColorStop(1,'#020a04');
  ctx.fillStyle=water;ctx.fillRect(0,390,W,H-390);
  // Water ripples
  for(let ri=0;ri<8;ri++){
    const rx=ri*90+Math.sin(t*0.03+ri)*20;const ry=420+ri%3*18;
    const ra=Math.sin(t*0.04+ri)*0.15+0.15;
    ctx.strokeStyle=`rgba(20,60,25,${ra})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(rx,ry,25,6,0,0,Math.PI*2);ctx.stroke();
  }
  // Concrete walkway / ledge
  ctx.fillStyle='#0a150c';ctx.fillRect(0,370,W,25);
  ctx.fillStyle='rgba(8,20,10,0.8)';
  for(let lx=0;lx<W;lx+=50){ctx.fillRect(lx,370,1,25);}
  // Toxic green glow pools
  [[80,400,20],[250,410,15],[500,405,18],[640,400,16]].forEach(([gx,gy,gr])=>{
    const ga=Math.sin(t*0.06+gx)*0.1+0.25;
    ctx.fillStyle=`rgba(30,140,40,${ga})`;ctx.beginPath();ctx.arc(gx,gy,gr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(40,180,50,${ga*.4})`;ctx.beginPath();ctx.arc(gx,gy,gr*2,0,Math.PI*2);ctx.fill();
  });
  // Green fog wisps
  for(let fi=0;fi<5;fi++){
    const fx=fi*140+Math.sin(t*0.005+fi)*30;
    ctx.fillStyle=`rgba(10,40,15,0.18)`;
    ctx.beginPath();ctx.ellipse(fx,400,80,20,0,0,Math.PI*2);ctx.fill();
  }
  // Overhead flickering light
  const bulbA=Math.sin(t*0.15)>0.8?0.05:0.12;
  [150,340,530].forEach(lx=>{
    ctx.fillStyle=`rgba(150,200,120,${bulbA})`;ctx.beginPath();ctx.arc(lx,120,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(180,220,140,0.4)';ctx.beginPath();ctx.arc(lx,120,5,0,Math.PI*2);ctx.fill();
  });
}

/* ───────── VULCÃO ───────── */
function drawBG_Volcano(ctx,W,H,t){

  const sky=ctx.createLinearGradient(0,0,0,H*.5);

  for(let ls=0;ls<4;ls++){

  }
  // Ruined volcanic rock structures
  [[0,210,50,370],[45,240,40,320],[580,205,60,355],[620,245,60,315]].forEach(([x,y,w,h])=>{
    ctx.fillStyle='#1a0800';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#100500';
    for(let bi=x;bi<x+w;bi+=10){const bh=4+Math.sin(bi)*4;ctx.fillRect(bi,y,8,bh);}
  });
  // Scorched ground / lava floor
  const lavaGround=ctx.createLinearGradient(0,380,0,H);
  lavaGround.addColorStop(0,'#200600');lavaGround.addColorStop(0.4,'#180400');lavaGround.addColorStop(1,'#100200');
  ctx.fillStyle=lavaGround;ctx.fillRect(0,380,W,H-380);
  // Lava cracks glowing
  ctx.strokeStyle='rgba(255,60,0,0.5)';ctx.lineWidth=2;
  for(let ci=0;ci<8;ci++){
    const cx2=ci*90+10;
    ctx.beginPath();ctx.moveTo(cx2,390);ctx.bezierCurveTo(cx2+15,405,cx2+30,400,cx2+50,415);ctx.stroke();
    const la=Math.sin(t*0.06+ci)*0.2+0.4;
    ctx.strokeStyle=`rgba(255,${80+ci*8},0,${la})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx2,390);ctx.bezierCurveTo(cx2+15,405,cx2+30,400,cx2+50,415);ctx.stroke();
    ctx.strokeStyle='rgba(255,60,0,0.5)';ctx.lineWidth=2;
  }
  // Lava pools
  [[60,415,30],[180,420,22],[380,418,28],[530,415,25],[650,420,20]].forEach(([lx,ly,lr])=>{
    const la=Math.sin(t*0.07+lx)*0.15+0.6;
    ctx.fillStyle=`rgba(255,60,0,${la*0.7})`;ctx.beginPath();ctx.ellipse(lx,ly,lr,lr*.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,140,0,${la*0.5})`;ctx.beginPath();ctx.ellipse(lx,ly,lr*.6,lr*.25,0,0,Math.PI*2);ctx.fill();
  });
  // Flying embers

function drawZombie(ctx,z,t){
  if(z.dead)return;

  // zombie type colors

  ctx.beginPath();ctx.moveTo(4,8);ctx.lineTo(7,12);ctx.lineTo(8,8);ctx.closePath();ctx.fill();

  ctx.save();ctx.rotate(-0.4);ctx.fillRect(-16,-6,4,4);ctx.fillRect(-18,-4,3,3);ctx.restore();
  ctx.save();ctx.rotate(0.4);ctx.fillRect(13,-6,4,4);ctx.fillRect(16,-4,3,3);ctx.restore();

  ctx.fillStyle=sk;ctx.beginPath();ctx.arc(0,-12,8,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.arc(-2,-18,4,0,Math.PI);ctx.fill();
  ctx.beginPath();ctx.arc(3,-18,3,0,Math.PI);ctx.fill();

  ctx.fillStyle='#ff2020';ctx.beginPath();ctx.arc(-3,-12,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#800000';ctx.beginPath();ctx.arc(-3,-12,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-12,1,0,Math.PI*2);ctx.fill();
  // mouth (open, rotting)
  ctx.fillStyle='#1a0808';ctx.beginPath();ctx.ellipse(0,-8,4,3,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#e0d0a0';ctx.fillRect(-3,-9,2,3);ctx.fillRect(1,-9,2,3);
  // decay marks
  ctx.fillStyle='rgba(0,50,0,0.3)';ctx.beginPath();ctx.arc(-5,-15,3,0,Math.PI*2);ctx.fill();

    score:0,kills:0,coinsEarned:0,

function spawnWave(){G.zombiesSpawned=0;G.waveCleared=false;G.ch_waveStart=G.t;G.ch_ammoStart=G.player.ammo;}

function spawnZombie(){
  if(G.zombiesSpawned>=G.zombiesPerWave)return;
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*680;y=-30;}else if(side===1){x=710;y=Math.random()*560;}else if(side===2){x=Math.random()*680;y=590;}else{x=-30;y=Math.random()*560;}
  const sp=G.isBoss?1.8:1+G.lvl*0.1;
  const isRunner=(G.lvl>=3&&Math.random()<0.22);
  const coinVal=Math.floor((1+G.lvl*0.5)*(isRunner?2:1)*G.coinMult);
  G.zombies.push({x,y,w:26,h:26,health:G.zHP,maxHealth:G.zHP,speed:(isRunner?2.5:1+G.lvl*0.07)*sp,runner:isRunner,dmg:0.006+G.lvl*0.003,dead:false,dying:false,dyingTimer:0,coinVal,variant:Math.floor(Math.random()*4)});
  G.zombiesSpawned++;
}

function shootBullet(){
  if(!G.gameRunning||G.player.dead||G.player.ammo<=0||G.reloading)return;
  if(G.t-G.lastShot<G.shootCooldown)return;
  G.lastShot=G.t;
  const p=G.player;const px=p.x+14,py=p.y+14;
  const dx=mouseX-px,dy=mouseY-py,len=Math.sqrt(dx*dx+dy*dy)||1;
  const w=G.stats.weapon;const shots=w.id==='shotgun'?3:1;
  for(let i=0;i<shots;i++){
    const spread=(Math.random()-.5)*w.spread*2+(w.id==='shotgun'?(i-1)*0.28:0);
    const angle=Math.atan2(dy,dx)+spread;
    G.bullets.push({x:px,y:py,vx:Math.cos(angle)*w.bspd,vy:Math.sin(angle)*w.bspd,r:w.bsz,life:70,boss:false,used:false,color:w.color});
  }
  p.ammo--;sndShoot();if(p.ammo===0)startReload();
}
function startReload(){if(G.reloading||G.player.ammo===G.player.maxAmmo||G.player.dead)return;G.reloading=true;G.reloadTimer=G.reloadMax;if(G.challenge===CHALLENGES[1])G.ch_noReload=false;showMsg('Recarregando...',1400);}
function showMsg(txt,dur=1600){const el=document.getElementById('game-msg');el.textContent=txt;el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity=0;},dur);}
function addFloat(x,y,txt,color='#fff'){G.floatTexts.push({x,y,txt,color,life:55,vy:-1.1});}
function spawnCoin(x,y,val){G.coins.push({x,y,val,life:180,vy:-0.5,collected:false});}

function gameLoop(){if(paused||!G.gameRunning)return;animFrame=requestAnimationFrame(gameLoop);G.t++;update();render();}

function update(){
  if(G.player.dead)return;
  const p=G.player;
  if(keys['arrowleft']||keys['a']||gpMoveX<-GP_DEADZONE)p.x-=p.speed;
  if(keys['arrowright']||keys['d']||gpMoveX>GP_DEADZONE)p.x+=p.speed;
  if(keys['arrowup']||keys['w']||gpMoveY<-GP_DEADZONE)p.y-=p.speed;
  if(keys['arrowdown']||keys['s']||gpMoveY>GP_DEADZONE)p.y+=p.speed;
  p.x=Math.max(0,Math.min(652,p.x));p.y=Math.max(50,Math.min(530,p.y));
  if(gpAimActive){mouseX=p.x+14+gpAimX*150;mouseY=p.y+14+gpAimY*150;}
  if(p.hitFlash>0)p.hitFlash--;
  if(shootHeld||gpShootHeld)shootBullet();
  if(G.reloading){G.reloadTimer--;if(G.reloadTimer<=0){G.reloading=false;p.ammo=p.maxAmmo;}}
  G.bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  G.bullets=G.bullets.filter(b=>b.life>0&&b.x>-20&&b.x<700&&b.y>-20&&b.y<580);
  if(!G.waveCleared){G.spawnTimer++;if(G.spawnTimer>=G.spawnInterval&&G.zombiesSpawned<G.zombiesPerWave){spawnZombie();G.spawnTimer=0;}}
  G.zombies.forEach(z=>{if(z.dying){z.dyingTimer--;if(z.dyingTimer<=0)z.dead=true;}});
  G.noHitTimer++;
  G.zombies.forEach(z=>{
    if(z.dead||z.dying)return;
    const dx=p.x+14-z.x-13,dy=p.y+14-z.y-13;const len=Math.sqrt(dx*dx+dy*dy)||1;
    z.x+=dx/len*z.speed;z.y+=dy/len*z.speed;
    if(rectRect(z,p)){const dmg=z.dmg*(1-G.armorPct);p.health-=dmg;p.hitFlash=6;G.noHitTimer=0;G.ch_bossNoDmg=false;}
  });
  if(G.challenge===CHALLENGES[3]&&G.noHitTimer>=15*60&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
  G.coins.forEach(c=>{
    if(c.collected)return;c.y+=c.vy;c.life--;
    const dx=p.x+14-c.x,dy=p.y+14-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<22){c.collected=true;currentPlayer.coins+=c.val;G.coinsEarned+=c.val;savePlayers();sndCoin();addFloat(c.x,c.y,'🪙+'+c.val,'#ffd700');document.getElementById('hud-coins').textContent='🪙'+(currentPlayer.coins||0).toLocaleString();}
  });
  G.coins=G.coins.filter(c=>!c.collected&&c.life>0);
  G.bullets.forEach(b=>{
    if(b.boss||b.used)return;
    G.zombies.forEach(z=>{
      if(z.dead||z.dying||b.used)return;
      if(rectCircle(b.x,b.y,b.r,z.x,z.y,z.w,z.h)){
        b.used=true;const isCrit=Math.random()<G.critChance;const dmg=(G.stats.weapon.damage+G.dmgBonus)*(isCrit?2:1);
        z.health-=dmg;sndHit();
        const pc=isCrit?'#ff3030':'#8a1010';
        for(let i=0;i<8;i++)G.particles.push({x:z.x+13,y:z.y+13,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20,color:pc});
        if(isCrit)addFloat(b.x,b.y,'CRITICO!','#ff3030');
        if(z.health<=0&&!z.dying){z.dying=true;z.dyingTimer=14;G.kills++;G.score+=100;addFloat(z.x+13,z.y,'+ 100','#f4c542');spawnCoin(z.x+13,z.y+13,z.coinVal);sndKill();checkChallengeKill(z);}
      }
    });
  });
  G.bullets=G.bullets.filter(b=>!b.used);
  if(G.isBoss&&G.boss&&!G.win){
    G.bullets.forEach(b=>{
      if(b.boss||b.used)return;const bs=G.boss;
      if(rectCircle(b.x,b.y,b.r,bs.x,bs.y,bs.w,bs.h)){
        b.used=true;const isCrit=Math.random()<G.critChance;const dmg=(3+G.dmgBonus)*(isCrit?2:1);
        bs.health-=dmg;G.score+=50;sndHit();
        for(let i=0;i<6;i++)G.particles.push({x:bs.x+30,y:bs.y+30,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:22,color:'#f4c542'});
        const pct=Math.max(0,bs.health/bs.maxHealth);document.getElementById('boss-hb-fill').style.width=(pct*100)+'%';
        if(bs.health<=0){winLevel();return;}
        if(pct<=0.5&&!G.bossEnraged){G.bossEnraged=true;bs.speed*=1.6;showMsg('Chefao enraivecido!',2200);}
      }
    });
    G.bullets=G.bullets.filter(b=>!b.used);
  }
  if(G.isBoss&&G.boss&&!G.win){
    const bs=G.boss;bs.x+=bs.speed*bs.dir;if(bs.x>618||bs.x<2)bs.dir*=-1;bs.phase+=0.025;bs.y=75+Math.sin(bs.phase)*35;bs.shootTimer++;
    const interval=G.bossEnraged?50:90;
    if(bs.shootTimer>=interval){bs.shootTimer=0;const bx=bs.x+30,by=bs.y+30;const dx=p.x+14-bx,dy=p.y+14-by,len=Math.sqrt(dx*dx+dy*dy)||1;const spd=4.5;
      if(G.bossEnraged){[-0.22,0,0.22].forEach(off=>{const a=Math.atan2(dy,dx)+off;G.bullets.push({x:bx,y:by,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:6,life:140,boss:true,used:false,color:'#ff4010'});});}
      else G.bullets.push({x:bx,y:by,vx:dx/len*spd,vy:dy/len*spd,r:6,life:140,boss:true,used:false,color:'#f4a030'});}
  }
  G.bullets.forEach(b=>{if(!b.boss||b.used)return;if(rectCircle(b.x,b.y,b.r,p.x,p.y,p.w,p.h)){b.used=true;const dt=10*(1-G.armorPct);p.health-=dt;p.hitFlash=12;G.noHitTimer=0;G.ch_bossNoDmg=false;sndHit();}});
  G.bullets=G.bullets.filter(b=>!b.used);
  G.zombies=G.zombies.filter(z=>!z.dead);
  G.particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;});G.particles=G.particles.filter(pt=>pt.life>0);
  G.floatTexts.forEach(ft=>{ft.y+=ft.vy;ft.life--;});G.floatTexts=G.floatTexts.filter(ft=>ft.life>0);
  const aliveZ=G.zombies.filter(z=>!z.dying).length;
  if(!G.waveCleared&&G.zombiesSpawned>=G.zombiesPerWave&&aliveZ===0){
    G.waveCleared=true;checkChallengeWave();
    if(G.wave<G.maxWaves){G.wave++;G.score+=500;showMsg('Onda '+G.wave+'! +500 pts',1500);setTimeout(()=>{if(G.gameRunning)spawnWave();},1600);}
    else if(!G.isBoss){winLevel();}
  }
  if(G.challenge===CHALLENGES[8]&&p.health<=10)G.ch_lowHealthReached=true;
  if(G.challenge===CHALLENGES[8]&&G.ch_lowHealthReached&&G.waveCleared&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
  if(G.challenge===CHALLENGES[9]&&G.isBoss&&G.boss&&G.boss.health<=0&&G.ch_bossNoDmg&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
  p.health=Math.max(0,Math.min(p.maxHealth,p.health));
  document.getElementById('hud-health-fill').style.width=(p.health/p.maxHealth*100)+'%';
  document.getElementById('hud-ammo-fill').style.width=(p.ammo/p.maxAmmo*100)+'%';
  document.getElementById('hud-kills').textContent=G.kills;
  document.getElementById('hud-score').textContent=G.score.toLocaleString();
  if(p.health<=0&&!p.dead){p.dead=true;G.gameRunning=false;sndDie();setTimeout(gameOver,600);}
}

function checkChallengeKill(z){
  const ch=G.challenge;
  if(ch===CHALLENGES[0]){G.ch_killBurst.push(G.t);G.ch_killBurst=G.ch_killBurst.filter(t=>G.t-t<600);if(G.ch_killBurst.length>=5&&!G.challengeDone){G.challengeDone=true;completeChallenge();}}
  if(ch===CHALLENGES[2]){G.ch_headshotsRow++;if(G.ch_headshotsRow>=3&&!G.challengeDone){G.challengeDone=true;completeChallenge();}}
  if(ch===CHALLENGES[4]&&z.runner&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
  if(ch===CHALLENGES[7]&&z.runner&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
}
function checkChallengeWave(){
  const ch=G.challenge;
  if(ch===CHALLENGES[1]&&G.ch_noReload&&!G.challengeDone){G.challengeDone=true;completeChallenge();}
  if(ch===CHALLENGES[5]){const el=(G.t-G.ch_waveStart)/60;if(el<=8&&!G.challengeDone){G.challengeDone=true;completeChallenge();}}
  if(ch===CHALLENGES[6]){const used=G.ch_ammoStart-G.player.ammo;if(used<=G.ch_ammoStart*.2&&!G.challengeDone){G.challengeDone=true;completeChallenge();}}
}
function completeChallenge(){G.score+=1000;addFloat(340,260,'DESAFIO! +1000','#f4c542');showMsg('DESAFIO CONCLUIDO! +1000 pts',2800);sndChallenge();}

function winLevel(){
  if(G.win)return;G.win=true;G.gameRunning=false;if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  const bonusCoins=BOSS_LEVELS.includes(G.lvl)?80:Math.floor(10+G.lvl*2);
  currentPlayer.coins+=bonusCoins;G.coinsEarned+=bonusCoins;
  G.score+=(BOSS_LEVELS.includes(G.lvl)?3000:500);currentPlayer.score+=G.score;
  if(!currentPlayer.completedLevels.includes(G.lvl))currentPlayer.completedLevels.push(G.lvl);
  if(G.lvl>=currentPlayer.maxLevel&&G.lvl<TOTAL_LEVELS)currentPlayer.maxLevel=G.lvl+1;
  savePlayers();sndWin();
  const isLastBoss=G.lvl===50;
  document.getElementById('win-title').textContent=BOSS_LEVELS.includes(G.lvl)?'CHEFAO DERROTADO!':isLastBoss?'APOCALIPSE VENCIDO!':'Missao Concluida!';
  document.getElementById('win-title').style.color=BOSS_LEVELS.includes(G.lvl)?'#f4c542':'#4caf50';
  document.getElementById('win-stats').innerHTML=`Missao ${G.lvl}${BOSS_LEVELS.includes(G.lvl)?' BOSS':''}<br>Zumbis eliminados: ${G.kills}<br>Pontos: ${G.score.toLocaleString()}<br>Total: ${currentPlayer.score.toLocaleString()}<br><span style="color:#ffd700">🪙 Moedas ganhas: ${G.coinsEarned}</span><br>${G.challengeDone?'<span style="color:#f4c542">Desafio: +1000</span>':''}`;
  document.getElementById('btn-next-level').style.display=G.lvl>=TOTAL_LEVELS?'none':'';
  showScreen('screen-win');
}

function gameOver(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  const partial=Math.floor(G.score*.5);currentPlayer.score+=partial;savePlayers();
  document.getElementById('go-stats').innerHTML=`Missao ${G.lvl} — ${G.kills} eliminados<br>Pontos parciais: ${partial.toLocaleString()}<br>Total: ${currentPlayer.score.toLocaleString()}<br><span style="color:#ffd700">🪙 Moedas: ${G.coinsEarned}</span>`;
  showScreen('screen-gameover');
}

function render(){
  const W=680,H=560;
  drawLevelBG(ctx,G.lvl,G.t);
  G.particles.forEach(pt=>{ctx.globalAlpha=pt.life/20;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  G.coins.forEach(c=>{
    ctx.globalAlpha=Math.min(1,c.life/30);
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x,c.y,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffec6e';ctx.beginPath();ctx.arc(c.x-1,c.y-1,2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });
  G.bullets.forEach(b=>{
    const trail=b.boss?'rgba(255,100,20,0.3)':'rgba(255,220,50,0.3)';
    ctx.fillStyle=trail;ctx.beginPath();ctx.arc(b.x-b.vx*.5,b.y-b.vy*.5,b.r*.7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=b.color||'#ffe066';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  });
  G.zombies.forEach(z=>drawZombie(ctx,z,G.t));
  if(G.isBoss&&G.boss)drawBoss(ctx,G.boss,G,G.t);
  const p=G.player;
  drawPlayer(ctx,p,mouseX,mouseY,G.t);
  if(G.reloading){
    const prog=1-(G.reloadTimer/G.reloadMax);
    ctx.strokeStyle='#f4c542';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(p.x+14,p.y+14,22,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
    ctx.fillStyle='#f4c542';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('R',p.x+14,p.y+19);ctx.textAlign='left';
  }
  const px=p.x+14,py=p.y+14;
  const adx=mouseX-px,ady=mouseY-py,alen=Math.sqrt(adx*adx+ady*ady)||1;
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+adx/alen*30,py+ady/alen*30);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,150,0.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mouseX-10,mouseY);ctx.lineTo(mouseX+10,mouseY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX,mouseY-10);ctx.lineTo(mouseX,mouseY+10);ctx.stroke();
  ctx.beginPath();ctx.arc(mouseX,mouseY,4,0,Math.PI*2);ctx.stroke();
  G.floatTexts.forEach(ft=>{ctx.globalAlpha=ft.life/55;ctx.fillStyle=ft.color;ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(ft.txt,ft.x,ft.y);});
  ctx.globalAlpha=1;ctx.textAlign='left';
  if(!G.isBoss){const envNames={city:'CIDADE',farm:'FAZENDA',cemetery:'CEMITÉRIO',mall:'SHOPPING',moon:'LUA',snow:'NEVE',desert:'DESERTO',sewer:'ESGOTO',volcano:'VULCÃO',forest:'FLORESTA'};ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='11px sans-serif';ctx.fillText('Onda '+G.wave+'/'+G.maxWaves+' | '+(envNames[G.env]||G.env.toUpperCase()),10,H-8);}
}

initBGParticles();showScreen('screen-login');
</script>
